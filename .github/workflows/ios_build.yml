name: Build iOS (Teste no iPhone)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Descarrega o código ─────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Instala o Flutter (versão mais recente stable) ──────────
      # Usa a versão latest stable para garantir Dart 3.8.0+
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Mostra a versão instalada (para diagnóstico) ────────────
      - name: Verificar versão Flutter e Dart
        run: |
          flutter --version
          dart --version

      # ── 4. Corrige flutter_lints no pubspec.yaml se necessário ─────
      # Garante compatibilidade sem precisar editar manualmente
      - name: Corrigir dependências
        run: |
          # Substitui flutter_lints ^6.0.0 por ^5.0.0 se necessário
          if grep -q "flutter_lints: \^6" pubspec.yaml; then
            sed -i '' 's/flutter_lints: \^6\.[0-9]\.[0-9]/flutter_lints: ^5.0.0/' pubspec.yaml
            echo "flutter_lints corrigido para ^5.0.0"
          else
            echo "flutter_lints já está OK"
          fi
          cat pubspec.yaml | grep flutter_lints

      # ── 5. Instala as dependências do projeto ──────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. Instala o certificado de desenvolvimento ────────────────
      - name: Instalar certificado Apple
        env:
          CERTIFICATE_BASE64:   ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:    bukaplus-keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # ── 7. Instala o Provisioning Profile ─────────────────────────
      - name: Instalar Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ── 8. Compila o app iOS ───────────────────────────────────────
      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=profile \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # ── 9. Exporta o .ipa ──────────────────────────────────────────
      - name: Exportar .ipa
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bukaplus.bibliotecaVirtualNh</key>
              <string>profile</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      # ── 10. Guarda o .ipa para download ───────────────────────────
      - name: Guardar .ipa
        uses: actions/upload-artifact@v4
        with:
          name: Buka-Plus-iOS
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 7
